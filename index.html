<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>거지주차.com</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=0j4jrp2z8y&submodules=geocoder"></script>
</head>
<body>
    <div id="map"></div>

    <div id="report-container">
        <input type="text" id="user-nick" placeholder="닉네임 (기억됨)">
        <input type="text" id="parking-name" placeholder="주차장 명칭">
        <select id="parking-type">
            <option value="상시 무료">상시 무료</option>
            <option value="밤샘 무료(야간)">밤샘 무료(야간)</option>
            <option value="주말 및 공휴일 무료">주말 및 공휴일 무료</option>
            <option value="조건부 무료">조건부 무료</option>
            <option value="회차 무료">회차 무료</option>
        </select>
        <button onclick="제보하기()">무료 주차 제보</button>
        <p id="guide-text">지도를 클릭해 위치를 지정하세요</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
