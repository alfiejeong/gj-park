<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>거지주차.com</title>
    <!-- [추가] 인라인 SVG favicon (별도 파일 없이 404 제거) -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23FFD400'/%3E%3Ctext x='50' y='72' text-anchor='middle' font-size='72' font-family='sans-serif' font-weight='900' fill='%23000'%3EP%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <script src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=0j4jrp2z8y&submodules=geocoder"></script>
</head>
<body style="background-color: #FFD400; margin: 0; padding: 0;">

    <!-- [수정] saving-modal: 인라인 display:flex 제거 → toggleLoading()이 hidden 클래스로만 제어 -->
    <div id="saving-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:#fff;">
        <div class="loader"></div>
        <p id="loading-msg" style="margin-top:20px; font-weight:bold; font-size:18px;">데이터 처리 중...</p>
    </div>

    <div id="loading-screen">
        <div class="loader-content">
            <h1>거지주차.com</h1>
            <div class="loader"></div>
            <p>내 주변 명당 찾는 중...</p>
        </div>
    </div>

    <div id="board-page" class="hidden">
        <div class="board-container">
            <div class="board-header">
                <h2>💬 수다방</h2>
                <button onclick="closeBoard()" class="back-btn">← 지도로 돌아가기</button>
            </div>
            <div id="board-content"></div>
            <button id="write-btn" onclick="showWriteForm()">+ 글쓰기</button>
        </div>
    </div>

    <!-- [신규 - 단계 3] 랭킹 페이지 -->
    <div id="ranking-page" class="hidden">
        <div class="ranking-container">
            <div class="ranking-header">
                <h2>🏆 랭킹</h2>
                <button onclick="closeRanking()" class="back-btn">← 지도로 돌아가기</button>
            </div>
            <div id="ranking-content"></div>
        </div>
    </div>

    <div id="header-bar">
        <h1>거지주차.com</h1>
        <div class="by-line">by 쌍칼(alfiejeong@gmail.com)</div>
    </div>

    <div id="map"></div>

    <!-- [신규 2026-04-20] 좌측 플로팅 위젯 — 현재 위치 기준 가까운 주차 5곳 -->
    <div id="nearby-widget" class="map-widget map-widget-left hidden">
        <div class="map-widget-header" onclick="toggleWidget('nearby-widget')">
            <span>📍 가까운 주차</span>
            <span class="map-widget-chevron">▾</span>
        </div>
        <div id="nearby-list" class="map-widget-body"></div>
    </div>

    <!-- [신규 2026-04-20] 우측 플로팅 위젯 — 최근 수다방 5개 -->
    <div id="recent-board-widget" class="map-widget map-widget-right hidden">
        <div class="map-widget-header" onclick="toggleWidget('recent-board-widget')">
            <span>💬 최근 수다</span>
            <span class="map-widget-chevron">▾</span>
        </div>
        <div id="recent-board-list" class="map-widget-body"></div>
    </div>

    <div id="floating-menu">
        <button onclick="moveToMyLoc()" class="f-btn">📍 내위치</button>
        <button onclick="openModal()" class="f-btn primary">📢 제보하기</button>
        <button id="board-toggle-btn" onclick="openBoard()" class="f-btn">💬 수다방</button>
        <button onclick="openRanking()" class="f-btn">🏆 랭킹</button>
    </div>

    <div id="modal" class="hidden">
        <div class="modal-content">
            <h3>📍 주차 명당 제보</h3>
            <p id="addr-text">지도를 클릭해 위치를 잡으세요</p>
            <div style="display: flex; gap: 5px; margin-bottom: 8px;">
                <input type="text" id="nick" placeholder="닉네임" style="flex: 1.5;">
                <input type="password" id="p-pw" placeholder="비번(고정)" style="flex: 1;">
            </div>
            <input type="text" id="pname" placeholder="장소명">
            <select id="ptype">
                <option value="상시 무료">상시 무료</option>
                <option value="밤샘 무료(야간)">밤샘 무료(야간)</option>
                <option value="주말·공휴일 무료">주말·공휴일 무료</option>
                <option value="조건부 무료">조건부 무료</option>
                <option value="회차 무료">회차 무료</option>
            </select>
            <textarea id="pdesc" placeholder="상세내용(주차 꿀팁 등)을 입력하세요"></textarea>
            <!-- [신규 2026-04-20] 주차장 사진 업로드 (파일 또는 URL). 없으면 기본 'P' 이미지가 자동 적용됨 -->
            <input type="file" id="p-file" accept="image/*">
            <input type="text" id="p-img-url" placeholder="또는 이미지 URL (선택)">
            <div style="font-size:11px; color:#888; margin:-2px 0 8px;">※ 파일이 있으면 URL은 무시됩니다. 사진이 없으면 기본 이미지가 표시돼요.</div>
            <div class="modal-btns">
                <button onclick="submitReport()" class="btn-save">정보 저장</button>
                <button onclick="closeModal()" class="btn-cancel">닫기</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
