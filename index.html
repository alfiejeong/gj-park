<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>거지주차.com</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=0j4jrp2z8y&submodules=geocoder"></script>
</head>
<body style="background-color: #FFD400; margin: 0; padding: 0;">

    <div id="saving-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff;">
        <div class="loader"></div>
        <p style="margin-top:20px; font-weight:bold; font-size:18px;">데이터 저장 중...</p>
        <p style="font-size:13px; color:#ccc;">잠시만 기다려 주세요.</p>
    </div>

    <div id="loading-screen">
        <div class="loader-content">
            <h1>거지주차.com</h1>
            <div class="loader"></div>
            <p>내 주변 명당 찾는 중...</p>
        </div>
    </div>

    <div id="board-page" class="hidden">
        <div class="board-container">
            <div class="board-header">
                <h2>💬 수다방</h2>
                <button onclick="closeBoard()" class="back-btn">← 지도로 돌아가기</button>
            </div>
            <div id="board-content"></div>
            <button id="write-btn" onclick="showWriteForm()">+ 글쓰기</button>
        </div>
    </div>

    <div id="header-bar">
        <h1>거지주차.com</h1>
        <div class="by-line">by 쌍칼(alfiejeong@gmail.com)</div>
    </div>

    <div id="map"></div>

    <div id="floating-menu">
        <button onclick="moveToMyLoc()" class="f-btn">📍 내위치</button>
        <button onclick="openModal()" class="f-btn primary">📢 제보하기</button>
        <button id="board-toggle-btn" onclick="openBoard()" class="f-btn">💬 수다방</button>
        <button onclick="alert('준비 중')" class="f-btn">🏆 랭킹</button>
    </div>

    <div id="modal" class="hidden">
        <div class="modal-content">
            <h3>📍 주차 명당 제보</h3>
            <p id="addr-text">지도를 클릭해 위치를 잡으세요</p>
            <div style="display: flex; gap: 5px; margin-bottom: 8px;">
                <input type="text" id="nick" placeholder="닉네임" style="flex: 1.5;">
                <input type="password" id="p-pw" placeholder="비번(고정)" style="flex: 1;">
            </div>
            <input type="text" id="pname" placeholder="장소명">
            <select id="ptype">
                <option value="상시 무료">상시 무료</option>
                <option value="밤샘 무료(야간)">밤샘 무료(야간)</option>
                <option value="주말·공휴일 무료">주말·공휴일 무료</option>
                <option value="조건부 무료">조건부 무료</option>
                <option value="회차 무료">회차 무료</option>
            </select>
            <textarea id="pdesc" placeholder="상세내용(주차 꿀팁 등)을 입력하세요"></textarea>
            <div class="modal-btns">
                <button onclick="submitReport()" class="btn-save">정보 저장</button>
                <button onclick="closeModal()" class="btn-cancel">닫기</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
