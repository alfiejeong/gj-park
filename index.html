<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>거지주차.com</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=0j4jrp2z8y&submodules=geocoder"></script>
</head>
<body>
    <div class="header">
        <div style="text-align: center;">
            <h1>거지주차.com</h1>
            <div style="font-size: 10px; font-weight: bold; color: #444; margin-top: -2px;">BY 구마적(alfiejeong@gmail.com)</div>
        </div>
    </div>
    <div id="map"></div>
        <div class="input-group"><label>도로명 주소 (자동)</label><input type="text" id="place-addr" readonly></div>
        <div class="input-group"><label>장소 명칭</label><input type="text" id="place-name"></div>
        <div style="display:flex; gap:10px;">
            <div class="input-group" style="flex:2;">
    <label>주차유형</label>
    <select id="parking-type" style="width: 100%; padding: 10px; border: 1px solid #eee; border-radius: 10px; font-size: 14px;">
        <option value="상시 무료">상시 무료</option>
        <option value="밤샘 무료">밤샘 무료 (야간)</option>
        <option value="주말/공휴일 무료">주말/공휴일 무료</option>
        <option value="조건부 무료">조건부 무료 (상점 이용)</option>
        <option value="회차 무료">회차 무료 (단시간)</option>
    </select>
</div>
            <div class="input-group" style="flex:1;"><label>면수</label><input type="text" id="parking-cap"></div>
        </div>
        <div class="input-group"><label>상세내용 (꿀팁)</label><textarea id="place-note"></textarea></div>
