<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>거지주차.com</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=0j4jrp2z8y&submodules=geocoder"></script>
</head>
<body>
    <div id="header-bar">
        <h1>거지주차.com</h1>
        <span class="footer-copy">by 쌍칼(alfiejeong@gmail.com)</span>
    </div>

    <div id="map"></div>

    <div id="floating-nav">
        <button onclick="moveToMyLoc()" class="float-btn">📍 내위치</button>
        <button onclick="openModal()" class="float-btn primary">📢 제보하기</button>
        <button onclick="alert('준비 중입니다')" class="float-btn">💬 수다방</button>
        <button onclick="alert('준비 중입니다')" class="float-btn">🏆 랭킹</button>
    </div>

    <div id="modal" class="hidden">
        <div class="modal-body">
            <h3>📍 주차 명당 제보</h3>
            <p id="addr-preview">지도를 클릭해 위치를 찍어주세요</p>
            <input type="text" id="nick" placeholder="제보자 닉네임">
            <input type="text" id="pname" placeholder="장소명">
            <select id="ptype">
                <option value="상시 무료">상시 무료</option>
                <option value="밤샘 무료(야간)">밤샘 무료(야간)</option>
                <option value="주말·공휴일 무료">주말·공휴일 무료</option>
                <option value="조건부 무료">조건부 무료</option>
                <option value="회차 무료">회차 무료</option>
            </select>
            <textarea id="pdesc" placeholder="상세내용을 입력하세요"></textarea>
            <div class="modal-btns">
                <button onclick="submitReport()" class="btn-save">정보 저장</button>
                <button onclick="closeModal()" class="btn-cancel">닫기</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
