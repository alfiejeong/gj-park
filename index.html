<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>거지주차.com</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=0j4jrp2z8y&submodules=geocoder"></script>
</head>
<body style="background-color: #FFD400; margin: 0; padding: 0;">

    <div id="loading-screen">
        <div class="loader-content">
            <h1>거지주차.com</h1>
            <div class="loader"></div>
            <p>내 주변 명당 찾는 중...</p>
        </div>
    </div>

    <div id="header-bar">
        <h1>거지주차.com</h1>
        <div class="by-line">by 쌍칼(alfiejeong@gmail.com)</div>
    </div>

    <div id="map"></div>

    <div id="floating-menu">
        <button onclick="moveToMyLoc()" class="f-btn">📍 내위치</button>
        <button onclick="openModal()" class="f-btn primary">📢 제보하기</button>
        <button onclick="openBoard()" class="f-btn">💬 수다방</button>
        <button onclick="alert('준비 중')" class="f-btn">🏆 랭킹</button>
    </div>

    <div id="modal" class="hidden">
        <div class="modal-content">
            <h3>📍 주차 명당 제보</h3>
            <p id="addr-text">지도를 클릭해 위치를 잡으세요</p>
            <input type="text" id="nick" placeholder="제보자 닉네임">
            <input type="text" id="pname" placeholder="장소명">
            <select id="ptype">
                <option value="상시 무료">상시 무료</option>
                <option value="밤샘 무료(야간)">밤샘 무료(야간)</option>
                <option value="주말·공휴일 무료">주말·공휴일 무료</option>
                <option value="조건부 무료">조건부 무료</option>
                <option value="회차 무료">회차 무료</option>
            </select>
            <textarea id="pdesc" placeholder="상세내용을 입력하세요"></textarea>
            <div class="modal-btns">
                <button onclick="submitReport()" class="btn-save">정보 저장</button>
                <button onclick="closeModal()" class="btn-cancel">닫기</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

    <div id="board-modal" class="hidden">
        <div class="modal-content board-content" style="background:#fff; width:90%; max-height:80vh; overflow-y:auto; border-radius:20px; padding:20px; border:3px solid #FFD400;">
            <h3 style="text-align:center;">💬 거지주차 수다방</h3>
            <div id="post-list" style="margin-bottom:20px;"></div>
            <hr style="border:1px dashed #FFD400;">
            <div class="board-write-section">
                <h4>나도 한마디</h4>
                <input type="text" id="b-title" placeholder="제목" style="width:100%; margin-bottom:5px;">
                <textarea id="b-content" placeholder="내용을 입력하세요" style="width:100%; height:80px; margin-bottom:5px;"></textarea>
                <input type="text" id="b-link" placeholder="링크 공유 (선택)" style="width:100%; margin-bottom:5px;">
                <input type="file" id="b-file" accept="image/*" style="width:100%; margin-bottom:10px;">
                <div class="modal-btns">
                    <button onclick="submitPost()" class="btn-save">글쓰기 완료</button>
                    <button onclick="closeBoard()" class="btn-cancel">닫기</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
